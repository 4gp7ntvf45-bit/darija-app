<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Kaoutar — learn Moroccan Arabic vocabulary</title>
<style>
  @font-face {
    font-family: 'Noto Naskh Arabic';
    src: local('Noto Naskh Arabic'), local('Geeza Pro'), local('Damascus');
  }

  :root{
    --sand: #F4EDE2;
    --sand-deep: #ECE1D1;
    --ink: #2B2118;
    --ink-soft: #6B5D4F;
    --terracotta: #B85C3E;
    --terracotta-deep: #8F4530;
    --terracotta-pale: #F0DCD0;
    --teal: #2B6157;
    --teal-pale: #DCE9E4;
    --clay-card: #FFFCF7;
    --gold: #C9912E;
    --gold-pale: #F5E6C8;
    --rose: #B23A4E;
    --rose-pale: #F4DDE0;
    --line: rgba(43,33,24,0.12);
    --line-soft: rgba(43,33,24,0.07);
    --shadow-card: 0 1px 2px rgba(43,33,24,0.04), 0 8px 24px -8px rgba(43,33,24,0.10);
  }

  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Inter',system-ui,sans-serif;
    background:var(--sand);
    color:var(--ink);
    min-height:100vh;
  }

  .app{
    max-width:720px;
    margin:0 auto;
    padding:28px 20px 60px;
  }

  /* ---------- header ---------- */
  .topbar{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:22px;
  }
  .brand{
    font-family:'Fraunces',serif;
    font-size:26px;
    font-weight:600;
    letter-spacing:-0.01em;
    display:flex;
    align-items:baseline;
    gap:10px;
  }
  .brand .ar{
    font-family:'Noto Naskh Arabic','Geeza Pro','Damascus',serif;
    font-size:22px;
    color:var(--terracotta-deep);
    font-weight:700;
  }
  .tagline{
    font-size:13px;
    color:var(--ink-soft);
    margin-top:2px;
  }
  .icon-btn{
    background:none;
    border:none;
    color:var(--ink-soft);
    cursor:pointer;
    font-size:20px;
    padding:6px;
    border-radius:8px;
    line-height:1;
  }
  .icon-btn:hover{background:var(--sand-deep); color:var(--ink);}

  /* ---------- stats strip ---------- */
  .stats{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    margin-bottom:24px;
  }
  .stat{
    background:var(--clay-card);
    border:0.5px solid var(--line);
    border-radius:14px;
    padding:13px 14px;
  }
  .stat-num{
    font-family:'Fraunces',serif;
    font-size:24px;
    font-weight:600;
    line-height:1.1;
  }
  .stat-label{
    font-size:11.5px;
    color:var(--ink-soft);
    margin-top:3px;
    letter-spacing:0.01em;
  }
  .stat.due .stat-num{color:var(--terracotta-deep);}
  .stat.learned .stat-num{color:var(--teal);}
  .stat.streak .stat-num{color:var(--gold);}

  /* ---------- mode switch ---------- */
  .mode-row{
    display:flex;
    gap:8px;
    margin-bottom:20px;
  }
  .mode-btn{
    flex:1;
    padding:10px 14px;
    border-radius:12px;
    border:0.5px solid var(--line);
    background:var(--clay-card);
    color:var(--ink-soft);
    font-size:13.5px;
    font-weight:500;
    cursor:pointer;
    text-align:center;
  }
  .mode-btn.active{
    background:var(--ink);
    color:var(--sand);
    border-color:var(--ink);
  }

  .cat-row{
    margin-bottom:10px;
  }
  .cat-select-btn{
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 14px;
    border-radius:12px;
    border:0.5px solid var(--line);
    background:var(--clay-card);
    color:var(--ink);
    font-size:13.5px;
    font-weight:500;
    cursor:pointer;
    font-family:'Inter',sans-serif;
  }
  .cat-chevron{color:var(--ink-soft); font-size:11px;}
  .cat-grid{
    display:flex;
    flex-wrap:wrap;
    gap:7px;
    margin-bottom:18px;
    padding:12px;
    background:var(--sand-deep);
    border-radius:12px;
  }
  .cat-pill{
    padding:7px 12px;
    border-radius:9px;
    border:0.5px solid var(--line);
    background:var(--clay-card);
    color:var(--ink-soft);
    font-size:12.5px;
    cursor:pointer;
    font-family:'Inter',sans-serif;
  }
  .cat-pill.active{
    background:var(--terracotta);
    color:#fff;
    border-color:var(--terracotta);
  }

  .sentence-block{
    margin-top:16px;
    padding-top:14px;
    border-top:0.5px dashed var(--line);
    width:100%;
    text-align:left;
  }
  .sentence-eyebrow{
    font-size:11px;
    color:var(--ink-soft);
    margin-bottom:6px;
    letter-spacing:0.03em;
  }
  .sentence-ar{
    font-family:'Noto Naskh Arabic','Geeza Pro','Damascus',serif;
    font-size:17px;
    direction:rtl;
    margin-bottom:3px;
  }
  .sentence-lat{
    font-size:13px;
    color:var(--ink-soft);
    margin-bottom:5px;
    font-style:italic;
  }
  .sentence-en{
    font-size:13px;
    color:var(--ink-soft);
  }

  /* ---------- translator mode ---------- */
  .translate-panel{
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .translate-input-row{
    position:relative;
  }
  .translate-input{
    width:100%;
    padding:14px 16px;
    border-radius:14px;
    border:0.5px solid var(--line);
    background:var(--clay-card);
    font-size:16px;
    font-family:'Inter',sans-serif;
    color:var(--ink);
    box-shadow:var(--shadow-card);
  }
  .translate-input:focus{
    outline:none;
    border-color:var(--terracotta);
  }
  .translate-results{
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .translate-hint{
    text-align:center;
    color:var(--ink-soft);
    font-size:13.5px;
    padding:24px 12px;
  }
  .translate-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:14px;
    background:var(--clay-card);
    border:0.5px solid var(--line);
    border-radius:12px;
    padding:13px 16px;
  }
  .translate-en{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:16px;
    color:var(--ink);
    flex:1;
  }
  .translate-darija{
    text-align:right;
    flex:1;
  }
  .translate-ar{
    font-family:'Noto Naskh Arabic','Geeza Pro','Damascus',serif;
    font-size:18px;
    direction:rtl;
  }
  .translate-lat{
    font-size:12.5px;
    color:var(--ink-soft);
    margin-top:2px;
  }
  .translate-section-label{
    font-size:12px;
    color:var(--ink-soft);
    letter-spacing:0.03em;
    margin-top:14px;
    margin-bottom:-4px;
    padding-left:2px;
  }
  .sentences-count{
    font-size:12.5px;
    color:var(--ink-soft);
    text-align:center;
  }
  .sentence-search-card{
    background:var(--clay-card);
    border:0.5px solid var(--line);
    border-radius:12px;
    padding:14px 16px;
    text-align:left;
  }
  .sentence-search-word{
    font-size:11px;
    color:var(--terracotta-deep);
    font-weight:600;
    letter-spacing:0.02em;
    margin-bottom:6px;
    text-transform:uppercase;
  }
  .sentence-search-ar{
    font-family:'Noto Naskh Arabic','Geeza Pro','Damascus',serif;
    font-size:17px;
    direction:rtl;
    margin-bottom:3px;
  }
  .sentence-search-lat{
    font-size:13px;
    color:var(--ink-soft);
    font-style:italic;
    margin-bottom:4px;
  }
  .sentence-search-en{
    font-size:13px;
    color:var(--ink-soft);
  }

  /* ---------- session intro / empty state ---------- */
  .panel{
    background:var(--clay-card);
    border:0.5px solid var(--line);
    border-radius:18px;
    box-shadow:var(--shadow-card);
    padding:40px 32px;
    text-align:center;
  }
  .panel h2{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:21px;
    margin:0 0 8px;
  }
  .panel p{
    font-size:14px;
    color:var(--ink-soft);
    line-height:1.6;
    margin:0 0 22px;
    max-width:420px;
    margin-left:auto;
    margin-right:auto;
  }
  .big-btn{
    background:var(--terracotta);
    color:#fff;
    border:none;
    border-radius:14px;
    padding:14px 28px;
    font-size:15px;
    font-weight:500;
    cursor:pointer;
    font-family:'Inter',sans-serif;
  }
  .big-btn:hover{background:var(--terracotta-deep);}
  .big-btn:disabled{background:var(--line); color:var(--ink-soft); cursor:default;}

  /* ---------- card ---------- */
  .card-zone{
    min-height:380px;
    display:flex;
    flex-direction:column;
  }
  .progress-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:14px;
    font-size:12.5px;
    color:var(--ink-soft);
  }
  .progress-track{
    flex:1;
    height:5px;
    background:var(--sand-deep);
    border-radius:4px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background:var(--terracotta);
    border-radius:4px;
    transition:width 0.25s ease;
  }
  .dir-tag{
    font-size:11px;
    font-weight:500;
    padding:3px 9px;
    border-radius:7px;
    background:var(--teal-pale);
    color:var(--teal);
    letter-spacing:0.02em;
    white-space:nowrap;
  }
  .dir-tag.rev{background:var(--terracotta-pale); color:var(--terracotta-deep);}

  .flashcard{
    flex:1;
    background:var(--clay-card);
    border:0.5px solid var(--line);
    border-radius:20px;
    box-shadow:var(--shadow-card);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:48px 28px;
    cursor:pointer;
    position:relative;
    min-height:280px;
  }
  .flashcard:hover{border-color:var(--line-soft);}
  .card-eyebrow{
    font-size:12px;
    color:var(--ink-soft);
    margin-bottom:14px;
    letter-spacing:0.03em;
  }
  .card-prompt{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:34px;
    line-height:1.2;
    color:var(--ink);
  }
  .card-prompt.arabic{
    font-family:'Noto Naskh Arabic','Geeza Pro','Damascus',serif;
    font-size:42px;
    direction:rtl;
  }
  .tap-hint{
    position:absolute;
    bottom:20px;
    font-size:12px;
    color:var(--ink-soft);
  }

  .answer-block{
    margin-top:20px;
    padding-top:20px;
    border-top:0.5px solid var(--line);
    width:100%;
  }
  .answer-main{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:26px;
    margin-bottom:6px;
  }
  .answer-main.arabic{
    font-family:'Noto Naskh Arabic','Geeza Pro','Damascus',serif;
    font-size:32px;
    direction:rtl;
  }
  .answer-sub{
    font-size:15px;
    color:var(--ink-soft);
    font-family:'Inter',sans-serif;
  }

  /* ---------- grading row ---------- */
  .grade-row{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
    margin-top:16px;
  }
  .grade-btn{
    border:none;
    border-radius:12px;
    padding:13px 6px;
    font-size:13px;
    font-weight:500;
    cursor:pointer;
    font-family:'Inter',sans-serif;
    color:#fff;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:3px;
  }
  .grade-btn .interval{
    font-size:10.5px;
    opacity:0.85;
    font-weight:400;
  }
  .grade-again{background:var(--rose);}
  .grade-again:hover{background:#962f40;}
  .grade-hard{background:var(--gold);}
  .grade-hard:hover{background:#a8791f;}
  .grade-good{background:var(--teal);}
  .grade-good:hover{background:#1f4b43;}
  .grade-easy{background:var(--terracotta);}
  .grade-easy:hover{background:var(--terracotta-deep);}

  /* ---------- quiz mode ---------- */
  .quiz-options{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:18px;
  }
  .quiz-opt{
    background:var(--clay-card);
    border:0.5px solid var(--line);
    border-radius:12px;
    padding:14px 12px;
    font-size:15px;
    cursor:pointer;
    text-align:center;
    font-family:'Inter',sans-serif;
  }
  .quiz-opt.arabic{font-family:'Noto Naskh Arabic','Geeza Pro','Damascus',serif; font-size:18px; direction:rtl;}
  .quiz-opt:hover{border-color:var(--terracotta); background:var(--terracotta-pale);}
  .quiz-opt.correct{background:var(--teal-pale); border-color:var(--teal); color:var(--teal);}
  .quiz-opt.wrong{background:var(--rose-pale); border-color:var(--rose); color:var(--rose);}
  .quiz-opt.disabled{pointer-events:none;}

  /* ---------- footer controls ---------- */
  .footer-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:18px;
  }
  .link-btn{
    background:none;
    border:none;
    color:var(--ink-soft);
    font-size:13px;
    cursor:pointer;
    text-decoration:underline;
    font-family:'Inter',sans-serif;
    padding:4px;
  }
  .link-btn:hover{color:var(--ink);}

  /* ---------- settings panel ---------- */
  .settings-overlay{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(43,33,24,0.35);
    align-items:flex-start;
    justify-content:center;
    padding-top:60px;
    z-index:10;
    overflow-y:auto;
  }
  .settings-overlay.open{display:flex;}
  .settings-box{
    background:var(--clay-card);
    border-radius:16px;
    padding:24px 26px;
    width:min(380px, calc(100% - 40px));
    box-shadow:var(--shadow-card);
  }
  .settings-box h3{
    font-family:'Fraunces',serif;
    font-size:18px;
    margin:0 0 14px;
  }
  .settings-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 0;
    border-bottom:0.5px solid var(--line-soft);
    font-size:14px;
  }
  .settings-row:last-of-type{border-bottom:none;}
  .danger-link{
    color:var(--rose);
    font-size:13px;
    background:none;
    border:none;
    cursor:pointer;
    margin-top:14px;
    text-decoration:underline;
    font-family:'Inter',sans-serif;
  }

  .app-wrap{position:relative;}

  .bg-flowers{
    position:absolute;
    top:0;
    left:0;
    right:0;
    height:100%;
    overflow:hidden;
    pointer-events:none;
    z-index:0;
    opacity:0.5;
  }
  .bg-flowers svg{
    position:absolute;
  }
  .app{position:relative; z-index:1;}

  .secret-btn-row{
    margin-top:28px;
    text-align:center;
  }
  .secret-btn{
    background:none;
    border:0.5px dashed var(--line);
    color:var(--ink-soft);
    font-size:12px;
    padding:8px 16px;
    border-radius:10px;
    cursor:pointer;
    font-family:'Inter',sans-serif;
  }
  .secret-btn:hover{
    border-color:var(--rose);
    color:var(--rose);
  }

  .secret-overlay{
    position:fixed;
    inset:0;
    background:var(--sand);
    z-index:50;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }
  .secret-flowers{
    position:absolute;
    inset:0;
    pointer-events:none;
    z-index:0;
  }
  .secret-flowers svg{position:absolute;}
  .secret-content{
    position:relative;
    z-index:1;
    text-align:center;
    padding:40px 24px;
    max-width:560px;
  }
  .secret-message{
    font-family:'Noto Naskh Arabic','Geeza Pro','Damascus',serif;
    font-size:38px;
    line-height:1.6;
    color:var(--terracotta-deep);
    direction:rtl;
    font-weight:700;
  }
  .secret-close{
    margin-top:36px;
    background:var(--ink);
    color:var(--sand);
    border:none;
    border-radius:14px;
    padding:12px 26px;
    font-size:14px;
    cursor:pointer;
    font-family:'Inter',sans-serif;
  }

  @media (max-width:600px){
    .secret-message{font-size:26px;}
  }

  @media (max-width:600px){
    .app{padding:18px 14px 50px;}
    .topbar{margin-bottom:16px;}
    .brand{font-size:22px;}
    .brand .ar{font-size:19px;}
    .tagline{font-size:12px;}
    .stats{grid-template-columns:repeat(2,1fr); gap:8px;}
    .stat{padding:11px 12px;}
    .stat-num{font-size:20px;}
    .card-prompt{font-size:26px;}
    .card-prompt.arabic{font-size:32px;}
    .answer-main{font-size:22px;}
    .answer-main.arabic{font-size:28px;}
    .panel{padding:24px 16px;}
    .flashcard{padding:32px 18px; min-height:240px;}
    .grade-row{gap:6px;}
    .grade-btn{padding:14px 4px; font-size:12px; min-height:52px;}
    .grade-btn .interval{font-size:9.5px;}
    .quiz-options{grid-template-columns:1fr;}
    .quiz-opt{padding:16px 14px; font-size:16px;}
    .mode-btn{padding:12px 10px; font-size:13px;}
    .big-btn{width:100%; padding:16px 24px;}
    .cat-grid{max-height:260px; overflow-y:auto;}
    .translate-row{flex-direction:column; align-items:flex-start; gap:8px;}
    .translate-darija{text-align:left; width:100%;}
    .settings-box{width:calc(100% - 24px); padding:20px;}
  }

  @media (max-width:480px){
    .stats{grid-template-columns:repeat(2,1fr);}
    .card-prompt{font-size:28px;}
    .card-prompt.arabic{font-size:34px;}
    .panel{padding:28px 20px;}
  }
</style>
</head>
<body>

<div class="app-wrap">
<div class="bg-flowers" id="bg-flowers"></div>
<div class="app" id="app"></div>
</div>

<script>

</g>

`<svg width="60" height="60" viewBox="0 0 60 60"><g transform="translate(30,30)">
<g fill="#FFFCF7" opacity="0.95" stroke="#C9912E" stroke-width="0.5">
<ellipse cx="0" cy="-14" rx="8" ry="11"/>

<ellipse cx="-12" cy="-5" rx="8" ry="11" transform="rotate(288 -12 -5)"/>

<circle cx="0" cy="0" r="5" fill="#C9912E"/>

const STORAGE_KEY = 'darija-srs-progress-v1';
const SETTINGS_KEY = 'darija-srs-settings-v1';

let progress = {};
let settings = { dailyGoal: 20 };
let storageReady = false;

function todayStr(){
  return new Date().toISOString().slice(0,10);
}

function daysBetween(a, b){
  return Math.round((new Date(b) - new Date(a)) / 86400000);
}

async function loadState(){
  try{
    const p = localStorage.getItem(STORAGE_KEY);
    if(p) progress = JSON.parse(p);
  }catch(e){ progress = {}; }
  try{
    const s = localStorage.getItem(SETTINGS_KEY);
    if(s) settings = JSON.parse(s);
  }catch(e){ /* keep defaults */ }
  storageReady = true;
}

async function saveProgress(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
  }catch(e){ console.error('save failed', e); }
}

async function saveSettings(){
  try{
    localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
  }catch(e){ console.error('save failed', e); }
}

function getCardState(wordId, direction){
  const key = wordId + ':' + direction;
  if(!progress[key]){
    progress[key] = { ef: 2.5, interval: 0, reps: 0, due: todayStr(), lastGrade: null };
  }
  return progress[key];
}

function isDue(wordId, direction){
  const key = wordId + ':' + direction;
  const st = progress[key];
  if(!st) return true;
  return st.due <= todayStr();
}

function gradeCard(wordId, direction, grade){
  const key = wordId + ':' + direction;
  const st = getCardState(wordId, direction);
  let { ef, interval, reps } = st;

  if(grade === 0){
    reps = 0;
    interval = 0;
    ef = Math.max(1.3, ef - 0.2);
  } else {
    const q = grade;
    ef = Math.max(1.3, ef + (0.1 - (3-q)*(0.08+(3-q)*0.02)));
    reps += 1;
    if(reps === 1){
      interval = grade === 1 ? 1 : (grade === 2 ? 2 : 3);
    } else if(reps === 2){
      interval = grade === 1 ? 3 : (grade === 2 ? 5 : 7);
    } else {
      interval = Math.round(interval * ef);
    }
  }

  const due = new Date();
  due.setDate(due.getDate() + Math.max(1, interval));
  st.ef = ef;
  st.interval = interval;
  st.reps = reps;
  st.due = grade === 0 ? todayStr() : due.toISOString().slice(0,10);
  st.lastGrade = grade;
  progress[key] = st;
  saveProgress();
}

function previewInterval(wordId, direction, grade){
  const st = getCardState(wordId, direction);
  let { ef, interval, reps } = { ...st };
  if(grade === 0) return 'again today';
  let newInterval;
  if(reps === 0) newInterval = grade === 1 ? 1 : (grade === 2 ? 2 : 3);
  else if(reps === 1) newInterval = grade === 1 ? 3 : (grade === 2 ? 5 : 7);
  else newInterval = Math.round(interval * ef);
  newInterval = Math.max(1, newInterval);
  return newInterval === 1 ? '1 day' : newInterval + ' days';
}

function computeStats(){
  let dueCount = 0, learned = 0, total = 0;
  for(const w of WORDS){
    if(activeCategory !== 'all' && w.cat !== activeCategory) continue;
    for(const dir of ['e2d','d2e']){
      total++;
      const key = w.id + ':' + dir;
      const st = progress[key];
      if(st && st.reps > 0) learned++;
      if(isDue(w.id, dir)) dueCount++;
    }
  }
  return { dueCount, learned, total };
}

function computeStreak(){
  const log = progress.__log || {};
  let streak = 0;
  let d = new Date();
  while(true){
    const key = d.toISOString().slice(0,10);
    if(log[key]) { streak++; d.setDate(d.getDate()-1); }
    else break;
  }
  return streak;
}

function logToday(){
  if(!progress.__log) progress.__log = {};
  progress.__log[todayStr()] = true;
}

// ---------------- App state ----------------
let mode = 'flash';
let direction = 'mixed';
let activeCategory = 'all';
let session = [];
let sessionIdx = 0;
let cardFlipped = false;
let quizAnswered = false;
let sessionActive = false;
let settingsOpen = false;
let categoryPickerOpen = false;
let translateQuery = '';
let sentenceQuery = '';
let secretOpen = false;

function buildSession(){
  const dueWords = [];
  for(const w of WORDS){
    if(activeCategory !== 'all' && w.cat !== activeCategory) continue;
    const dirs = direction === 'mixed' ? ['e2d','d2e'] : [direction];
    for(const dir of dirs){
      if(isDue(w.id, dir)) dueWords.push({ word: w, dir });
    }
  }
  const shuffled = shuffleArray(dueWords);
  return shuffled.slice(0, settings.dailyGoal);
}

function startSession(){
  session = buildSession();
  sessionIdx = 0;
  cardFlipped = false;
  quizAnswered = false;
  sessionActive = true;
  logToday();
  render();
}

function endSession(){
  sessionActive = false;
  render();
}

function nextCard(){
  sessionIdx++;
  cardFlipped = false;
  quizAnswered = false;
  if(sessionIdx >= session.length){
    sessionActive = false;
  }
  render();
}

function flipCard(){
  cardFlipped = true;
  render();
}

function grade(g){
  const cur = session[sessionIdx];
  gradeCard(cur.word.id, cur.dir, g);
  nextCard();
}

function buildQuizOptions(current){
  const isE2D = current.dir === 'e2d';
  const correctAnswer = isE2D ? current.word.ar : current.word.en;
  const pool = WORDS.filter(w => w.id !== current.word.id);
  const distractors = sampleSize(pool, 3).map(w => isE2D ? w.ar : w.en);
  return shuffleArray([correctAnswer, ...distractors]);
}

let currentQuizOptions = null;
let currentQuizCorrect = null;

function answerQuiz(selected, correct){
  if(quizAnswered) return;
  quizAnswered = true;
  const cur = session[sessionIdx];
  const g = selected === correct ? 3 : 0;
  gradeCard(cur.word.id, cur.dir, g);
  render();
  setTimeout(() => { nextCard(); }, 900);
}

// ---------------- Rendering ----------------
function el(tag, attrs, children){
  attrs = attrs || {};
  const e = document.createElement(tag);
  for(const k in attrs){
    const v = attrs[k];
    if(v === null || v === undefined) continue;
    if(k === 'class') e.className = v;
    else if(k === 'html') e.innerHTML = v;
    else if(k.startsWith('on')) e.addEventListener(k.slice(2), v);
    else e.setAttribute(k, v);
  }
  (children||[]).forEach(c => { if(c) e.appendChild(c); });
  return e;
}
function txt(s){ return document.createTextNode(s); }

function renderStats(container){
  const stats = computeStats();
  const streak = computeStreak();
  const row = el('div',{class:'stats'});
  row.appendChild(el('div',{class:'stat due'},[
    el('div',{class:'stat-num'},[txt(stats.dueCount)]),
    el('div',{class:'stat-label'},[txt('Due now')])
  ]));
  row.appendChild(el('div',{class:'stat learned'},[
    el('div',{class:'stat-num'},[txt(stats.learned)]),
    el('div',{class:'stat-label'},[txt('Learned')])
  ]));
  row.appendChild(el('div',{class:'stat streak'},[
    el('div',{class:'stat-num'},[txt(streak)]),
    el('div',{class:'stat-label'},[txt(streak===1 ? 'Day streak' : 'Day streak')])
  ]));
  row.appendChild(el('div',{class:'stat'},[
    el('div',{class:'stat-num'},[txt(stats.total)]),
    el('div',{class:'stat-label'},[txt('Total cards')])
  ]));
  container.appendChild(row);
}

function renderModeRow(container){
  const row = el('div',{class:'mode-row'});
  const modes = [
    {k:'flash', label:'Flashcards'},
    {k:'quiz', label:'Quiz'},
    {k:'sentences', label:'Sentences'},
    {k:'translate', label:'Translate'}
  ];
  modes.forEach(m => {
    const btn = el('button',{
      class:'mode-btn' + (mode===m.k ? ' active':''),
      onclick: () => { if(!sessionActive){ mode = m.k; render(); } }
    },[txt(m.label)]);
    row.appendChild(btn);
  });
  container.appendChild(row);

  if(mode === 'translate' || mode === 'sentences') return;

  const dirRow = el('div',{class:'mode-row'});
  const dirs = [
    {k:'mixed', label:'Mixed'},
    {k:'e2d', label:'English → Darija'},
    {k:'d2e', label:'Darija → English'}
  ];
  dirs.forEach(d => {
    const btn = el('button',{
      class:'mode-btn' + (direction===d.k ? ' active':''),
      onclick: () => { if(!sessionActive){ direction = d.k; render(); } }
    },[txt(d.label)]);
    dirRow.appendChild(btn);
  });
  container.appendChild(dirRow);

  const catRow = el('div',{class:'cat-row'});
  const catLabel = activeCategory === 'all' ? 'All categories' : CATEGORY_LABELS[activeCategory];
  const catBtn = el('button',{
    class:'cat-select-btn',
    onclick: () => { if(!sessionActive){ categoryPickerOpen = !categoryPickerOpen; render(); } }
  },[
    el('span',{},[txt(catLabel)]),
    el('span',{class:'cat-chevron'},[txt(categoryPickerOpen ? '▴' : '▾')])
  ]);
  catRow.appendChild(catBtn);
  container.appendChild(catRow);

  if(categoryPickerOpen && !sessionActive){
    const grid = el('div',{class:'cat-grid'});
    const allBtn = el('button',{
      class:'cat-pill' + (activeCategory==='all' ? ' active':''),
      onclick: () => { activeCategory = 'all'; categoryPickerOpen = false; render(); }
    },[txt('All categories')]);
    grid.appendChild(allBtn);
    Object.keys(CATEGORY_LABELS).forEach(k => {
      const count = WORDS.filter(w => w.cat === k).length;
      const btn = el('button',{
        class:'cat-pill' + (activeCategory===k ? ' active':''),
        onclick: () => { activeCategory = k; categoryPickerOpen = false; render(); }
      },[txt(CATEGORY_LABELS[k] + ' (' + count + ')')]);
      grid.appendChild(btn);
    });
    container.appendChild(grid);
  }
}

function renderIntroPanel(container){
  const stats = computeStats();
  const panel = el('div',{class:'panel'});
  panel.appendChild(el('h2',{},[txt(stats.dueCount > 0 ? 'Ready to review' : "You're all caught up")]));
  const catNote = activeCategory === 'all' ? '' : ` in ${CATEGORY_LABELS[activeCategory]}`;
  panel.appendChild(el('p',{},[txt(
    stats.dueCount > 0
      ? `${stats.dueCount} cards are due${catNote}. A session covers up to ${settings.dailyGoal} cards.`
      : `No cards are due${catNote} right now. Come back later, or lower the daily goal in settings to study ahead.`
  )]));
  const startBtn = el('button',{
    class:'big-btn',
    onclick: startSession
  },[txt('Start session')]);
  startBtn.disabled = stats.dueCount === 0;
  panel.appendChild(startBtn);
  container.appendChild(panel);

  const secretRow = el('div',{class:'secret-btn-row'});
  secretRow.appendChild(el('button',{
    class:'secret-btn',
    onclick: () => { secretOpen = true; render(); }
  },[txt('Kaoutar Do Not Open')]));
  container.appendChild(secretRow);
}

function renderFlashcard(container){
  const cur = session[sessionIdx];
  const { word, dir } = cur;
  const isE2D = dir === 'e2d';

  const zone = el('div',{class:'card-zone'});

  const prow = el('div',{class:'progress-row'});
  prow.appendChild(el('span',{class:'dir-tag' + (isE2D?'':' rev')},[txt(isE2D ? 'EN → Darija' : 'Darija → EN')]));
  const track = el('div',{class:'progress-track'});
  track.appendChild(el('div',{class:'progress-fill', style:`width:${(sessionIdx/session.length)*100}%`}));
  prow.appendChild(track);
  prow.appendChild(el('span',{},[txt(`${sessionIdx+1} / ${session.length}`)]));
  zone.appendChild(prow);

  const card = el('div',{
    class:'flashcard',
    onclick: () => { if(!cardFlipped) flipCard(); }
  });

  card.appendChild(el('div',{class:'card-eyebrow'},[txt(isE2D ? 'English' : 'Darija')]));

  if(isE2D){
    card.appendChild(el('div',{class:'card-prompt'},[txt(word.en)]));
  } else {
    card.appendChild(el('div',{class:'card-prompt arabic'},[txt(word.ar)]));
    card.appendChild(el('div',{class:'answer-sub', style:'margin-top:8px;'},[txt(word.lat)]));
  }

  if(!cardFlipped){
    card.appendChild(el('div',{class:'tap-hint'},[txt('Tap to reveal')]));
  } else {
    const ablock = el('div',{class:'answer-block'});
    if(isE2D){
      ablock.appendChild(el('div',{class:'answer-main arabic'},[txt(word.ar)]));
      ablock.appendChild(el('div',{class:'answer-sub'},[txt(word.lat)]));
    } else {
      ablock.appendChild(el('div',{class:'answer-main'},[txt(word.en)]));
    }
    card.appendChild(ablock);

    if(word.sentAr){
      const sblock = el('div',{class:'sentence-block'});
      sblock.appendChild(el('div',{class:'sentence-eyebrow'},[txt('Example')]));
      sblock.appendChild(el('div',{class:'sentence-ar'},[txt(word.sentAr)]));
      sblock.appendChild(el('div',{class:'sentence-lat'},[txt(word.sentLat)]));
      sblock.appendChild(el('div',{class:'sentence-en'},[txt(word.sentEn)]));
      card.appendChild(sblock);
    }
  }

  zone.appendChild(card);

  if(cardFlipped){
    const grow = el('div',{class:'grade-row'});
    const grades = [
      {g:0, cls:'grade-again', label:'Again'},
      {g:1, cls:'grade-hard', label:'Hard'},
      {g:2, cls:'grade-good', label:'Good'},
      {g:3, cls:'grade-easy', label:'Easy'}
    ];
    grades.forEach(gr => {
      const interval = previewInterval(word.id, dir, gr.g);
      grow.appendChild(el('button',{
        class:'grade-btn ' + gr.cls,
        onclick: () => grade(gr.g)
      },[
        txt(gr.label),
        el('span',{class:'interval'},[txt(interval)])
      ]));
    });
    zone.appendChild(grow);
  }

  const frow = el('div',{class:'footer-row'});
  frow.appendChild(el('button',{class:'link-btn', onclick: endSession},[txt('End session')]));
  container.appendChild(zone);
  container.appendChild(frow);
}

function renderQuiz(container){
  const cur = session[sessionIdx];
  const { word, dir } = cur;
  const isE2D = dir === 'e2d';

  if(!currentQuizOptions || quizAnswered === false && currentQuizCorrect === null){
    // computed below per-card via cache key
  }

  const cacheKey = word.id + ':' + dir + ':' + sessionIdx;
  if(window.__quizCacheKey !== cacheKey){
    window.__quizCacheKey = cacheKey;
    currentQuizOptions = buildQuizOptions(cur);
    currentQuizCorrect = isE2D ? word.ar : word.en;
  }

  const zone = el('div',{class:'card-zone'});

  const prow = el('div',{class:'progress-row'});
  prow.appendChild(el('span',{class:'dir-tag' + (isE2D?'':' rev')},[txt(isE2D ? 'EN → Darija' : 'Darija → EN')]));
  const track = el('div',{class:'progress-track'});
  track.appendChild(el('div',{class:'progress-fill', style:`width:${(sessionIdx/session.length)*100}%`}));
  prow.appendChild(track);
  prow.appendChild(el('span',{},[txt(`${sessionIdx+1} / ${session.length}`)]));
  zone.appendChild(prow);

  const card = el('div',{class:'flashcard', style:'cursor:default;'});
  card.appendChild(el('div',{class:'card-eyebrow'},[txt(isE2D ? 'Translate to Darija' : 'Translate to English')]));
  if(isE2D){
    card.appendChild(el('div',{class:'card-prompt'},[txt(word.en)]));
  } else {
    card.appendChild(el('div',{class:'card-prompt arabic'},[txt(word.ar)]));
    card.appendChild(el('div',{class:'answer-sub', style:'margin-top:8px;'},[txt(word.lat)]));
  }
  zone.appendChild(card);

  const opts = el('div',{class:'quiz-options'});
  currentQuizOptions.forEach(opt => {
    const isCorrect = opt === currentQuizCorrect;
    let cls = 'quiz-opt' + (isE2D ? ' arabic' : '');
    if(quizAnswered){
      cls += isCorrect ? ' correct' : '';
      cls += ' disabled';
    }
    opts.appendChild(el('div',{
      class:cls,
      onclick: () => answerQuiz(opt, currentQuizCorrect)
    },[txt(opt)]));
  });
  zone.appendChild(opts);

  const frow = el('div',{class:'footer-row'});
  frow.appendChild(el('button',{class:'link-btn', onclick: endSession},[txt('End session')]));
  container.appendChild(zone);
  container.appendChild(frow);
}

function renderSentencesSection(container){
  const allSentences = WORDS.filter(w => w.sentEn);

  const panel = el('div',{class:'translate-panel'});

  const inputRow = el('div',{class:'translate-input-row'});
  const input = el('input',{
    type:'text',
    class:'translate-input',
    placeholder:'Search sentences by English, Darija, or Arabic…',
    value: sentenceQuery
  });
  input.addEventListener('input', (e) => {
    sentenceQuery = e.target.value;
    renderSentenceResults(resultsBox, allSentences);
  });
  inputRow.appendChild(input);
  panel.appendChild(inputRow);

  panel.appendChild(el('div',{class:'sentences-count'},[
    txt(`${allSentences.length} example sentences`)
  ]));

  const resultsBox = el('div',{class:'translate-results'});
  panel.appendChild(resultsBox);
  container.appendChild(panel);

  renderSentenceResults(resultsBox, allSentences);
}

function renderSentenceResults(resultsBox, allSentences){
  resultsBox.innerHTML = '';
  const q = sentenceQuery.trim().toLowerCase();

  const list = q
    ? allSentences.filter(w => {
        return w.en.toLowerCase().includes(q) ||
               w.sentEn.toLowerCase().includes(q) ||
               w.sentLat.toLowerCase().includes(q) ||
               w.sentAr.includes(sentenceQuery.trim());
      })
    : allSentences;

  if(list.length === 0){
    resultsBox.appendChild(el('div',{class:'translate-hint'},[
      txt('No sentences match that search.')
    ]));
    return;
  }

  const shown = list.slice(0, 50);
  shown.forEach(w => {
    const card = el('div',{class:'sentence-search-card'});
    card.appendChild(el('div',{class:'sentence-search-word'},[txt(w.en)]));
    card.appendChild(el('div',{class:'sentence-search-ar'},[txt(w.sentAr)]));
    card.appendChild(el('div',{class:'sentence-search-lat'},[txt(w.sentLat)]));
    card.appendChild(el('div',{class:'sentence-search-en'},[txt(w.sentEn)]));
    resultsBox.appendChild(card);
  });

  if(list.length > 50){
    resultsBox.appendChild(el('div',{class:'translate-hint'},[
      txt(`Showing 50 of ${list.length} matches — keep typing to narrow it down.`)
    ]));
  }
}

function renderSecretScreen(){
  const overlay = el('div',{class:'secret-overlay'});
  const flowersDiv = el('div',{class:'secret-flowers', id:'secret-flowers'});
  overlay.appendChild(flowersDiv);

  const content = el('div',{class:'secret-content'});
  content.appendChild(el('div',{class:'secret-message'},[txt('زوين، كنتمنى النهار لي نقدرو نهضرو فيه مزيان.')]));
  content.appendChild(el('button',{
    class:'secret-close',
    onclick: () => { secretOpen = false; render(); }
  },[txt('Close')]));
  overlay.appendChild(content);

  document.body.appendChild(overlay);
  renderSecretFlowers(flowersDiv);
}

function renderSettingsOverlay(container){
  const overlay = el('div',{class:'settings-overlay' + (settingsOpen?' open':'')});
  const box = el('div',{class:'settings-box'});
  box.appendChild(el('h3',{},[txt('Settings')]));

  const goalRow = el('div',{class:'settings-row'});
  goalRow.appendChild(el('span',{},[txt('Cards per session')]));
  const goalSelect = el('select',{style:'font-size:14px; padding:4px 8px; border-radius:8px; border:0.5px solid var(--line);'});
  [10,20,30,50].forEach(n => {
    const opt = el('option',{value:n},[txt(n)]);
    if(settings.dailyGoal === n) opt.setAttribute('selected','true');
    goalSelect.appendChild(opt);
  });
  goalSelect.addEventListener('change', (e) => {
    settings.dailyGoal = parseInt(e.target.value);
    saveSettings();
  });
  goalRow.appendChild(goalSelect);
  box.appendChild(goalRow);

  box.appendChild(el('button',{
    class:'danger-link',
    onclick: () => {
      if(confirm('Reset all progress? This cannot be undone.')){
        progress = {};
        saveProgress();
        settingsOpen = false;
        render();
      }
    }
  },[txt('Reset all progress')]));

  box.appendChild(el('div',{style:'margin-top:16px; text-align:right;'},[
    el('button',{class:'link-btn', onclick: () => { settingsOpen = false; render(); }},[txt('Close')])
  ]));

  overlay.appendChild(box);
  container.appendChild(overlay);
}

function renderTranslator(container){
  const panel = el('div',{class:'translate-panel'});

  const inputRow = el('div',{class:'translate-input-row'});
  const input = el('input',{
    type:'text',
    class:'translate-input',
    placeholder:'Type an English or Darija word…',
    value: translateQuery
  });
  input.addEventListener('input', (e) => {
    translateQuery = e.target.value;
    renderTranslateResults(resultsBox);
  });
  inputRow.appendChild(input);
  panel.appendChild(inputRow);

  const resultsBox = el('div',{class:'translate-results'});
  panel.appendChild(resultsBox);
  container.appendChild(panel);

  renderTranslateResults(resultsBox);

  // autofocus without scrolling the page
  setTimeout(() => { input.focus({preventScroll:true}); }, 0);
}

function renderTranslateResults(resultsBox){
  resultsBox.innerHTML = '';
  const q = translateQuery.trim().toLowerCase();

  if(!q){
    resultsBox.appendChild(el('div',{class:'translate-hint'},[
      txt('Start typing in either language — results update as you go.')
    ]));
    return;
  }

  const matches = WORDS.filter(w => {
    return w.en.toLowerCase().includes(q) ||
           w.lat.toLowerCase().includes(q) ||
           w.ar.includes(translateQuery.trim());
  }).slice(0, 30);

  const sentenceMatches = WORDS.filter(w => {
    if(!w.sentEn) return false;
    return w.sentEn.toLowerCase().includes(q) ||
           w.sentLat.toLowerCase().includes(q) ||
           w.sentAr.includes(translateQuery.trim());
  }).slice(0, 10);

  if(matches.length === 0 && sentenceMatches.length === 0){
    resultsBox.appendChild(el('div',{class:'translate-hint'},[
      txt('No matches yet. Try a shorter word or check your spelling.')
    ]));
    return;
  }

  matches.forEach(w => {
    const row = el('div',{class:'translate-row'});
    const left = el('div',{class:'translate-en'},[txt(w.en)]);
    const right = el('div',{class:'translate-darija'},[
      el('div',{class:'translate-ar'},[txt(w.ar)]),
      el('div',{class:'translate-lat'},[txt(w.lat)])
    ]);
    row.appendChild(left);
    row.appendChild(right);
    resultsBox.appendChild(row);
  });

  if(matches.length === 30){
    resultsBox.appendChild(el('div',{class:'translate-hint'},[
      txt('Showing first 30 word matches — keep typing to narrow it down.')
    ]));
  }

  if(sentenceMatches.length > 0){
    resultsBox.appendChild(el('div',{class:'translate-section-label'},[
      txt('Sentences using this')
    ]));
    sentenceMatches.forEach(w => {
      const card = el('div',{class:'sentence-search-card'});
      card.appendChild(el('div',{class:'sentence-search-ar'},[txt(w.sentAr)]));
      card.appendChild(el('div',{class:'sentence-search-lat'},[txt(w.sentLat)]));
      card.appendChild(el('div',{class:'sentence-search-en'},[txt(w.sentEn)]));
      resultsBox.appendChild(card);
    });
  }
}

function render(){
  const app = document.getElementById('app');
  app.innerHTML = '';

  const topbar = el('div',{class:'topbar'});
  const brandBlock = el('div',{});
  brandBlock.appendChild(el('div',{class:'brand'},[txt('For Kaoutar'), el('span',{class:'ar'},[txt('الدارجة')])]));
  brandBlock.appendChild(el('div',{class:'tagline'},[txt('Spaced repetition for your 1,300-word Darija list')]));
  topbar.appendChild(brandBlock);
  topbar.appendChild(el('button',{class:'icon-btn', onclick: () => { settingsOpen = true; render(); }, title:'Settings'},[txt('⚙')]));
  app.appendChild(topbar);

  if(mode === 'translate'){
    renderModeRow(app);
    renderTranslator(app);
  } else if(mode === 'sentences'){
    renderModeRow(app);
    renderSentencesSection(app);
  } else if(!sessionActive){
    renderStats(app);
    renderModeRow(app);
    renderIntroPanel(app);
  } else {
    if(sessionIdx >= session.length){
      sessionActive = false;
      renderStats(app);
      renderModeRow(app);
      const panel = el('div',{class:'panel'});
      panel.appendChild(el('h2',{},[txt('Session complete')]));
      panel.appendChild(el('p',{},[txt('Nice work. Your progress is saved — come back when more cards are due.')]));
      panel.appendChild(el('button',{class:'big-btn', onclick: startSession},[txt('Study more')]));
      app.appendChild(panel);
    } else if(mode === 'flash'){
      renderFlashcard(app);
    } else {
      renderQuiz(app);
    }
  }

  renderSettingsOverlay(document.querySelector('.app-wrap'));

  const existingSecret = document.querySelector('.secret-overlay');
  if(existingSecret) existingSecret.remove();
  if(secretOpen){
    renderSecretScreen();
  }
}

async function init(){
  try{
    await loadState();
    render();
  }catch(err){
    const app = document.getElementById('app');
    if(app){
      app.innerHTML = '<div style="padding:40px 20px; text-align:center; font-family:sans-serif; color:#6B5D4F;">' +
        '<p style="font-size:16px; margin-bottom:8px;">Something did not load correctly.</p>' +
        '<p style="font-size:13px;">' + (err && err.message ? err.message : 'Unknown error') + '</p>' +
        '</div>';
    }
    console.error('init failed', err);
  }
}
window.addEventListener('error', function(e){
  const app = document.getElementById('app');
  if(app && !app.innerHTML.trim()){
    app.innerHTML = '<div style="padding:40px 20px; text-align:center; font-family:sans-serif; color:#6B5D4F;">' +
      '<p style="font-size:16px;">Something went wrong loading the app.</p>' +
      '<p style="font-size:13px; margin-top:8px;">' + (e.message || '') + '</p>' +
      '</div>';
  }
});
init();
</script>
